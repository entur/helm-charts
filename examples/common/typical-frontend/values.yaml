common:
  app: typical-frontend
  appId: typfro
  team: example
  ingress:
    enabled: true
    trafficType: public
  service:
    internalPort: 9000
  deployment:
    prometheus:
      enabled: true
    minReplicas: 2
  container:
    image: <+artifacts.primary.image>
    cpu: 0.3
    memory: 512
  configmap:
    enabled: true
    data:
      TZ: "Europe/Oslo"
  secrets:
    auth-credentials: # k8s secret name "typical-frontend-auth-credentials"
      - MNG_AUTH0_INT_CLIENT_ID
      - MNG_AUTH0_INT_CLIENT_SECRET
