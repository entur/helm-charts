# -- Application name, typically on the form `the-application`
app:
# -- App ID from GoogleCloudApplication `metadata.id`. Max 10 alphanumeric characters. See https://github.com/entur/tf-gcp-apps/blob/main/docs/manifests/GoogleCloudApplication.md
appId:
# -- Your team name, without a `team-` prefix
team:
# -- The current env, override in your `values-kub-ent-$env.yaml` files to `dev`, `tst` or `prd`
env:
# -- Override release name, useful for multiple deployments
releaseName:

# -- Specify additional labels for every resource
# @default -- `{ app shortname team common:version environment }`
labels: {}

ingress:
  # -- Enable or disable the ingress
  enabled: true
  # -- Set the host name, do this in your `values-kub-ent-$env.yaml` files
  host:
  # -- Set the traffic type (`api`,`public` or `http2` for gRPC). Note: changing this value will cause a couple of minutes of downtime while the ingress controller reconciles.
  trafficType:
  # -- Set the IngressClass name. Uses `spec.ingressClassName` (replaces the deprecated `kubernetes.io/ingress.class` annotation).
  # @default -- traefik
  ingressClassName:
  # -- Optionally set annotations for the ingress
  annotations: {}
  # rules: # k8s spec for ingress rules

# -- Specify a list of `ingress` specs
ingresses: []

# -- Enable gRPC which will add an annotation and use grpc probes
grpc: false

deployment:
  # -- Enable or disable the deployment
  enabled: true
  # -- Add labels to your pods
  labels: {}
  # -- Configure volume, accepts kubernetes syntax
  volumes: []
  # -- Prometheus
  #prometheus: same as container.prometheus stanza
  # -- (int) Set the minimum replica count for HPA. Defaults to 1 for sbx/dev/tst and 2 for prd.
  minReplicas:
  # -- (int) Set the max replica count for HPA
  # @default -- 10
  maxReplicas:
  # -- (int) Force a fixed replica count, disables HPA and PDB. If set to 1 it will use Recreate strategy.
  forceReplicas:
  # -- (int) Override pod terminationGracePeriodSeconds (default 30s).
  terminationGracePeriodSeconds:
  # -- (string) Set minimum available %
  # @default -- 50%
  minAvailable:
  # -- Limit max surge for rolling updates (default 25%). Not in use when using forceReplicas.
  # @default -- 25%
  maxSurge:
  # -- Limit max unavailable for rolling updates (default 25%). Not in use when using forceReplicas.
  # @default -- 25%
  maxUnavailable:
  # -- Override pod serviceAccountName (default application).
  # @default -- application
  serviceAccountName:
  # -- Set the target CPU average utilization (%) for HPA scaling. With startupCPUBoost enabled, 70% is a good default. Without it, 100% may be needed for Java apps with heavy startup CPU usage.
  # @default -- 70
  cpuUtilization:
  startupCPUBoost:
    # -- Enable GKE Startup CPU Boost to temporarily increase CPU during pod startup. Requires the kube-startup-cpu-boost operator installed in the cluster. Boost is reverted when the pod becomes Ready. When enabled, a CPU limit of 1.3x the CPU request is automatically set (unless `container.cpuLimit` is explicitly configured).
    enabled: false
    # -- (int) Percentage to increase CPU requests during startup
    # @default -- 50
    percentageIncrease: 50
  # -- See https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#progress-deadline-seconds
  # @default -- 0
  minReadySeconds: 0

cron:
  # -- Enable or disable the cron job
  enabled: false
  # -- Concurrency policy
  # @default -- Forbid
  concurrencyPolicy:
  # -- (int) Failed jobs history limit
  # @default -- 1
  failedJobsHistoryLimit:
  # -- Required crontab schedule `* * * * * *`
  schedule:
  # -- (int) Successful jobs history limit
  # @default -- 1
  successfulJobsHistoryLimit:
  # -- Suspend flag
  # @default -- false
  suspend:
  # -- Add labels to your pods
  labels: {}
  # -- Configure volume, accepts kubernetes syntax
  volumes: []
  # -- (int) Override pod terminationGracePeriodSeconds (default 30s).
  # @default -- false
  terminationGracePeriodSeconds:
  # -- Override pod restartPolicy (default OnFailure).
  # @default -- OnFailure
  restartPolicy:
  # -- Override pod serviceAccountName (default application).
  # @default -- application
  serviceAccountName:
  # -- (int) Active deadline seconds for the job, default 24 hours (86300s)
  activeDeadlineSeconds:
hpa:
  # -- Additional HPA metrics appended alongside the default CPU metric. Accepts standard `autoscaling/v2` metric entries (Pods, Object, External).
  # Use for scaling on custom metrics from Cloud Monitoring, Prometheus (GMP), or Pub/Sub. When multiple metrics are specified, HPA picks the one demanding the most replicas.
  # @default -- []
  metrics: []
    # Pods type (per-pod custom metric, averaged across pods — supports AverageValue only):
    # - type: Pods
    #   pods:
    #     metric:
    #       name: prometheus.googleapis.com|http_requests_total|gauge
    #     target:
    #       type: AverageValue
    #       averageValue: 100
    #
    # External type (e.g. Pub/Sub queue depth — supports Value and AverageValue):
    # - type: External
    #   external:
    #     metric:
    #       name: pubsub.googleapis.com|subscription|num_undelivered_messages
    #       selector:
    #         matchLabels:
    #           resource.labels.subscription_id: my-subscription
    #     target:
    #       type: AverageValue
    #       averageValue: 5
    #
    # Object type (metric from another K8s object — supports Value and AverageValue):
    # - type: Object
    #   object:
    #     metric:
    #       name: requests-per-second
    #     describedObject:
    #       apiVersion: networking.k8s.io/v1
    #       kind: Ingress
    #       name: main-route
    #     target:
    #       type: Value
    #       value: 10k
  # -- (int) Seconds to wait before scaling up after a metric spike. Only applied when startupCPUBoost is disabled, to avoid scaling on startup CPU spikes. Tune this to match your application's typical startup time (e.g. 60s for a fast app, 300s for a heavy Spring Boot app with cache warming).
  # @default -- 120
  stabilizationWindowSeconds:
  # -- Full custom spec for HPA, replaces default metrics and min/max replicas. Inherits `scaleTargetRef`.
  spec:
    {}
    # Example for custom spec where cpu scaling is set to 60%:
    # metrics:
    #   - type: Resource
    #     resource:
    #       name: cpu
    #       target:
    #         type: Utilization
    #         averageUtilization: 60
    #   maxReplicas: 10
    #   minReplicas: 2

pdb:
  # -- (string) Set minimum available %, this overrides pdb setting minAvailable in deployment/container
  # @default -- 50%
  minAvailable:

service:
  # -- Enable or disable the service
  enabled: true
  # -- Set the external port for your service
  # @default -- 80
  externalPort: 80
  # -- Set the internal port for your service
  # @default -- 8080
  internalPort: 8080
  # -- Optionally set annotations for the service
  annotations: {}

# -- Takes a list of `container` entries, you must add a `name` field for each entry
containers: []

container:
  # -- Name of container
  # @default -- .app
  name:
  # -- Add labels to your pods
  labels: {}
  # -- Optionally set the command that will run in the pod. If not set, the entrypoint for the container-image is used (recommended for most Java-apps).
  command:
  # -- Optionally set the arguments that will be passed to the command, e.g. ["arg1","arg2"].
  args:
  # -- Set CPU without any unit. 100m is 0.1
  # @default -- 0.1
  cpu: 0.1
  # -- (float) Set CPU limit without any unit. 100m is 0.1
  # @default -- `5 x cpu`
  cpuLimit:
  # -- Set memory without any unit, `Mi` is inferred
  # @default -- 16
  memory: 16
  # -- @deprecated memoryLimit is removed. Memory limit is now always equal to memory request. Use `container.memory` instead.
  memoryLimit:
  # -- Set the uid that your user runs with
  # @default -- 1000
  uid: 1000
  # -- Attach secrets and configmaps to your `env`
  envFrom:
    []
    # - secretRef:
    #     name: app-psql-credentials
  # -- Specify `env` entries for your container
  env:
    []
    # - name: PORT
    #   value: "{{ .Values.service.internalPort }}"
  prometheus:
    # -- Enable or disable Prometheus
    enabled: false
    # -- Set the path for scraping metrics
    # @default -- /actuator/prometheus
    path: "/actuator/prometheus"
    # -- (int) Set the port for prometheus scraping
    # @default -- service.internalPort
    port:
  probes:
    # -- Enable or disable probes
    enabled: true
    # -- Override with k8s spec for custom probes
    spec:
      # livenessProbe:
      #   successThreshold: 1
      #   tcpSocket:
      #     port: admin
    liveness:
      # -- Set the path for liveness probe
      # @default -- /actuator/health/liveness
      path: "/actuator/health/liveness"
      # -- Set the initial delay for the probe
      initialDelaySeconds: 0
      # -- Set the success threshold
      # @default -- 1
      successThreshold: 1
      # -- Set the failure threshold
      # @default -- 6
      failureThreshold: 6
      # -- Set the period of checking
      # @default -- 5
      periodSeconds: 5
      # -- Specify grpc probes for a port. Needs `port` child stanza
      grpc:
        # port: 8080
    readiness:
      # -- Set the path for readiness probe
      # @default -- /actuator/health/readiness
      path: "/actuator/health/readiness"
      # -- Set the initial delay for the probe
      initialDelaySeconds: 0
      # -- Set the success threshold
      # @default -- 1
      successThreshold: 1
      # -- Set the failure threshold
      # @default -- 6
      failureThreshold: 6
      # -- Set the period of checking
      # @default -- 5
      periodSeconds: 5
      # -- Specify grpc probes for a port. Needs `port` child stanza
      grpc:
        # port: 8080
    startup:
      # -- Set the path for startup probe. If set, uses httpGet instead of tcpSocket. Useful when startup includes long-running tasks like cache warming.
      path:
      # -- Set the failure threshold
      # @default -- 300
      failureThreshold: 300
      # -- Set the period of checking
      # @default -- 1
      periodSeconds: 1
      # -- Specify grpc probes for a port. Needs `port` child stanza
      grpc:
        # port: 8080
  # -- Configure volume mounts, accepts kubernetes syntax
  volumeMounts: []
  # -- Configure volume, accepts kubernetes syntax
  volumes: []
  # -- Set pod lifecycle handlers
  lifecycle: {}

# -- Takes a list of initContainers
# -- See: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
initContainers: []

postgres:
  # -- Enable or disable the proxy
  # @default -- false
  enabled: false
  # -- Configure cpu request for proxy
  # @default -- 0.05
  cpu: 0.05
  # -- (float) Configure optional cpu limit for proxy
  cpuLimit:
  # -- Configure memory request for proxy without units, `Mi` inferred
  # @default -- 16
  memory: 16
  # -- (float) @deprecated memoryLimit is deprecated and will cause a deploy failure if set. Memory limit is now always equal to memory request. Use `postgres.memory` instead.
  memoryLimit:
  # -- List of Secret Manager keys containing Cloud SQL instance connection names. Supports multiple databases. Each key is mapped to `CSQL_PROXY_INSTANCE_CONNECTION_NAME_N` for the v2 proxy. The secret keys match those created by the `entur/terraform-google-sql-db` module (e.g. `PGINSTANCES`).
  # @default -- []
  instances: []
    # - PGINSTANCES
    # - ANALYTICS_PGINSTANCES
  # -- @deprecated connectionConfig is deprecated. Use `postgres.instances` instead to source connection names from Secret Manager via External Secrets.
  connectionConfig:
  # -- Override name for credentials secret. This must at least contain `PGUSER` and `PGPASSWORD`.
  credentialsSecret:

configmap:
  # -- Enable or disable the configmap
  # @default -- false
  enabled: false
  # -- Set data for configmap
  data:
    {}
    # MY_CONFIG: yes

# -- Add externalSecret to sync secrets from secret manager
secrets:
  {}
  # demo-secret:
  #   - FIRST_SECRET
  #   - SECOND_SECRET

vpa:
  # -- Enable Vertical Pod Autoscaler to get resource requirement and limit recommendations
  enabled: true
