{{- /* Rules */}}
{{- $chart := . -}}
{{- $releaseNamespace := .Release.Namespace -}}
{{- $releaseName := include "name" . -}}
{{- $postgres := .Values.postgres -}}
{{- if $postgres.enabled }}
{{- $instances := $postgres.instances | default list -}}
{{- if eq (len $instances) 0 }}
  {{- $instances = list (dict "secretKeyPrefix" "PG") }}
{{- end }}
{{- /* YAML Spec */}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $releaseName }}-sql-proxy
  namespace: {{ $releaseNamespace }}
  labels:
    {{- include "labels" $chart |trim| nindent 4 }}
  annotations:
    timestamp: {{ now | date "2006-01-02T15:04:05" }}
    {{- include "annotations" $chart |trim| nindent 4 }}
spec:
  data:
  {{- range $i, $inst := $instances }}
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: {{ $inst.secretKeyPrefix }}INSTANCES
      version: latest
    secretKey: CSQL_PROXY_INSTANCE_CONNECTION_NAME_{{ $i }}
  {{- end }}
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ $releaseNamespace }}
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: {{ $releaseName }}-sql-proxy
{{- end }}
