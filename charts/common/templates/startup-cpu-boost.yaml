{{- $releaseName := include "name" . -}}
{{- $startupCPUBoost := .Values.deployment.startupCPUBoost | default dict -}}
{{- if and .Values.deployment.enabled $startupCPUBoost.enabled }}
apiVersion: autoscaling.x-k8s.io/v1alpha1
kind: StartupCPUBoost
metadata:
  name: {{ $releaseName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels" . |trim| nindent 4 }}
  annotations:
    {{- include "annotations" . |trim| nindent 4 }}
selector:
  matchExpressions:
    - key: app
      operator: In
      values: ["{{ $releaseName }}"]
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        percentageIncrease:
          value: {{ $startupCPUBoost.percentageIncrease | default 50 }}
  durationPolicy:
    podCondition:
      type: Ready
      status: "True"
{{- end }}
