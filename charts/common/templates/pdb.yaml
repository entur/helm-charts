{{- /* Rules */}}
{{- $env := .Values.env | required ".Values.common.env is required." -}}
{{- $releaseName := include "name" . -}}
{{- $releaseNamespace := .Release.Namespace -}}
{{- $forceReplicas := .Values.deployment.forceReplicas -}}
{{- $minAvailable := .Values.deployment.minAvailable -}}
{{- $minReplicas := .Values.deployment.minReplicas -}}
{{- /*
  Determine if PDB should protect pods.
  - forceReplicas: exact count, no HPA — protect if > 1
  - HPA: protect if minReplicas > 1 (default 2)
  PDB is set to 0% only when effective replicas <= 1.
*/}}
{{- $protected := false -}}
{{- if $forceReplicas -}}
  {{- if gt (int $forceReplicas) 1 -}}
    {{- $protected = true -}}
  {{- end -}}
{{- else -}}
  {{- $effectiveMinReplicas := int (include "hpa.minReplicas" (dict "replicas" $minReplicas)) -}}
  {{- if gt $effectiveMinReplicas 1 -}}
    {{- $protected = true -}}
  {{- end -}}
{{- end -}}
{{- /* YAML Spec */}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $releaseName }}
  namespace: {{ $releaseNamespace }}
  labels:
    {{- include "labels" . |trim| nindent 4 }}
  annotations:
    {{- include "annotations" . |trim| nindent 4 }}
spec:
  {{- /* Allow eviction of unhealthy pods regardless of budget to prevent blocking node drains */}}
  unhealthyPodEvictionPolicy: AlwaysAllow
  {{- if not $protected }}
  {{- /* We set PDB even if only 1 effective replica or if hpa is disabled */}}
  {{- /* This is because helm is not able to delete unknown-previous config. */}}
  {{- /* In this case we set the minAvailable to 0% so it behaves the same way as a PDB does not exist. */}}
  minAvailable: 0%
  {{- else }}
  minAvailable: {{ $minAvailable | default "50%" }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $releaseName }}
