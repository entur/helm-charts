suite: test hpa
values:
  - ./values/common-test-values.yaml
templates:
  - hpa.yaml
tests:
  - it: must have labels
    set:
      env: prd # hpa in prod
      labels:
        custom: label
    asserts:
      - isNotEmpty:
          path: metadata.labels
      - equal:
          path: metadata.labels.environment
          value: prd
      - equal:
          path: metadata.labels.custom
          value: label
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: rudder-test
  - it: must have annotations
    set:
      env: prd
    asserts:
      - equal:
          path: metadata.annotations["meta.helm.sh/release-name"]
          value: rudder-test
      - equal:
          path: metadata.annotations["meta.helm.sh/release-namespace"]
          value: NAMESPACE
  - it: HPA is always generated by default
    asserts:
      - hasDocuments:
          count: 1
  - it: HPA minReplicas defaults to 1 in dev
    set:
      deployment:
        minReplicas: null
    asserts:
      - equal:
          path: spec.minReplicas
          value: 1
  - it: hpa must have labels
    set:
      deployment:
        maxReplicas: 2
    asserts:
      - isNotEmpty:
          path: metadata.labels
  - it: must have minReplicas 2 if not set
    set:
      env: prd
      deployment:
        maxReplicas: 5
      container:
        image: img
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
  - it: use minReplicas from deployment if not set on container
    set:
      deployment:
        minReplicas: 4
        maxReplicas: 5
      containers:
        - image: img
    asserts:
      - equal:
          path: spec.minReplicas
          value: 4
  # #TODO 100% cpu target is set as default?
  - it: uses 70 % as default target cpu
    set:
      deployment:
        maxReplicas: 5
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70
  - it: deployment.cpuUtilization overrides default
    set:
      deployment:
        maxReplicas: 5
        cpuUtilization: 60
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 60
  - it: adds 120s stabilization window when startupCPUBoost is disabled
    set:
      env: prd
    asserts:
      - equal:
          path: spec.behavior.scaleUp.stabilizationWindowSeconds
          value: 120
  - it: uses custom stabilizationWindowSeconds when set
    set:
      env: prd
      hpa:
        stabilizationWindowSeconds: 300
    asserts:
      - equal:
          path: spec.behavior.scaleUp.stabilizationWindowSeconds
          value: 300
  - it: no stabilization window when startupCPUBoost is enabled
    set:
      env: prd
      deployment:
        startupCPUBoost:
          enabled: true
    asserts:
      - notExists:
          path: spec.behavior
  - it: custom metrics are appended alongside CPU metric
    set:
      env: prd
      hpa:
        metrics:
          - type: Pods
            pods:
              metric:
                name: prometheus.googleapis.com|http_requests|gauge
              target:
                type: AverageValue
                averageValue: 100
    asserts:
      - equal:
          path: spec.metrics[0].type
          value: Resource
      - equal:
          path: spec.metrics[1].type
          value: Pods
      - equal:
          path: spec.metrics[1].pods.metric.name
          value: "prometheus.googleapis.com|http_requests|gauge"
      - equal:
          path: spec.metrics[1].pods.target.averageValue
          value: 100
  - it: Must default to 2 minReplicas in prod, max 10
    set:
      env: prd
      container:
        image: img
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10
  - it: Must not use hpa if forceReplicas is set
    set:
      env: prd
      deployment:
        maxReplicas: 5 # should not matter
        forceReplicas: 1
      container:
        image: some
      hpa:
        spec:
          maxReplicas: 199 # should not matter
          minReplicas: 99 # should not matter
    asserts:
      - hasDocuments:
          count: 0
  - it: Uses maxReplicas from deployment
    set:
      deployment:
        maxReplicas: 99
    asserts:
      - equal:
          path: spec.maxReplicas
          value: 99
  - it: must not use hpa if forceReplicas is set on deployment
    set:
      env: prd
      deployment:
        forceReplicas: 1
      containers:
        - image: some
    asserts:
      - hasDocuments:
          count: 0
  - it: must have scaleTargetRef even if spec is given
    set:
      env: prd
      hpa:
        spec:
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 200
    asserts:
      - isNotEmpty:
          path: spec.scaleTargetRef
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 200
  - it: setup hpa if hpa.spec is given in dev
    set:
      env: dev
      hpa:
        spec:
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: "50%"
          maxReplicas: 3
          minReplicas: 1
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: "50%"
      - equal:
          path: spec.minReplicas
          value: 1
      - equal:
          path: spec.maxReplicas
          value: 3
  - it: setup hpa if hpa.spec is given in tst
    set:
      env: tst
      hpa:
        spec:
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: "50%"
          maxReplicas: 4
          minReplicas: 1
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: "50%"
      - equal:
          path: spec.minReplicas
          value: 1
      - equal:
          path: spec.maxReplicas
          value: 4
  - it: setup hpa if hpa.spec is given in prd
    set:
      env: prd
      hpa:
        spec:
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: "60%"
          minReplicas: 3
          maxReplicas: 11
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: "60%"
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 11
  - it: can override release name
    set:
      env: prd
      releaseName: override
    asserts:
      - equal:
          path: metadata.name
          value: override
