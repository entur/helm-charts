suite: test sql-credentials ExternalSecret
values:
  - ./values/common-test-values.yaml
templates:
  - sql-credentials-secret.yaml
tests:
  - it: not created when postgres disabled
    asserts:
      - hasDocuments:
          count: 0
  - it: created with default PG prefix when enabled with no instances
    set:
      postgres:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.data[0].remoteRef.key
          value: PGUSER
      - equal:
          path: spec.data[0].secretKey
          value: PGUSER
      - equal:
          path: spec.data[1].remoteRef.key
          value: PGPASSWORD
      - equal:
          path: spec.data[1].secretKey
          value: PGPASSWORD
  - it: created with explicit instance prefix
    set:
      postgres:
        enabled: true
        instances:
          - secretKeyPrefix: MYAPP_PG
    asserts:
      - equal:
          path: spec.data[0].remoteRef.key
          value: MYAPP_PGUSER
      - equal:
          path: spec.data[0].secretKey
          value: MYAPP_PGUSER
      - equal:
          path: spec.data[1].remoteRef.key
          value: MYAPP_PGPASSWORD
      - equal:
          path: spec.data[1].secretKey
          value: MYAPP_PGPASSWORD
  - it: multiple instances produce entries for each prefix
    set:
      postgres:
        enabled: true
        instances:
          - secretKeyPrefix: PG
          - secretKeyPrefix: ANALYTICS_PG
    asserts:
      - equal:
          path: spec.data[0].remoteRef.key
          value: PGUSER
      - equal:
          path: spec.data[1].remoteRef.key
          value: PGPASSWORD
      - equal:
          path: spec.data[2].remoteRef.key
          value: ANALYTICS_PGUSER
      - equal:
          path: spec.data[3].remoteRef.key
          value: ANALYTICS_PGPASSWORD
  - it: not created when credentialsSecret is set
    set:
      postgres:
        enabled: true
        credentialsSecret: my-custom-creds
    asserts:
      - hasDocuments:
          count: 0
  - it: has correct metadata
    set:
      postgres:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: rudder-test-sql-credentials
      - equal:
          path: spec.target.name
          value: rudder-test-sql-credentials
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore
      - equal:
          path: spec.refreshInterval
          value: 1h
      - equal:
          path: spec.target.creationPolicy
          value: Owner
      - equal:
          path: spec.target.deletionPolicy
          value: Delete
  - it: uses decodingStrategy None and default conversion strategy
    set:
      postgres:
        enabled: true
    asserts:
      - equal:
          path: spec.data[0].remoteRef.decodingStrategy
          value: None
      - equal:
          path: spec.data[0].remoteRef.conversionStrategy
          value: Default
      - equal:
          path: spec.data[0].remoteRef.version
          value: latest
