suite: test pdb
values:
  - ./values/common-test-values.yaml
templates:
  - pdb.yaml
tests:
  - it: must have labels
    set:
      env: dev
      labels:
        custom: label
    asserts:
      - isNotEmpty:
          path: metadata.labels
      - equal:
          path: metadata.labels.environment
          value: dev
      - equal:
          path: metadata.labels.custom
          value: label
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: rudder-test
  - it: must have annotations
    set:
      env: prd
    asserts:
      - equal:
          path: metadata.annotations["meta.helm.sh/release-name"]
          value: rudder-test
      - equal:
          path: metadata.annotations["meta.helm.sh/release-namespace"]
          value: NAMESPACE
  - it: must always have unhealthyPodEvictionPolicy AlwaysAllow
    set:
      env: prd
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
  - it: must have unhealthyPodEvictionPolicy in all environments
    set:
      env: dev
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
  # default minReplicas=2 means PDB is always 50% by default
  - it: default minAvailable is 50% with default minReplicas 2
    set:
      env: prd
      deployment:
        minReplicas: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: default minAvailable is 50% in dev (minReplicas defaults to 2)
    set:
      env: dev
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: default minAvailable is 50% in tst (minReplicas defaults to 2)
    set:
      env: tst
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  # deployment.minAvailable overrides the default
  - it: deployment.minAvailable overrides default 50%
    set:
      env: prd
      deployment:
        minReplicas: 2
        minAvailable: 27%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "27%"
  - it: deployment.minAvailable works with containers list
    set:
      env: prd
      deployment:
        minReplicas: 2
        minAvailable: 26%
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "26%"
  - it: deployment.minAvailable 25% with containers list
    set:
      env: prd
      deployment:
        minReplicas: 2
        minAvailable: 25%
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "25%"
  - it: deployment.minAvailable 30% with containers list
    set:
      env: prd
      deployment:
        minReplicas: 2
        minAvailable: 30%
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "30%"
  # minReplicas=1: single pod, PDB should be 0%
  - it: minAvailable is 0% when minReplicas is 1 in prd
    set:
      env: prd
      deployment:
        minReplicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: minAvailable is 0% when minReplicas is 1 in dev
    set:
      env: dev
      deployment:
        minReplicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: minAvailable is 0% when minReplicas is 1 in tst
    set:
      env: tst
      deployment:
        minReplicas: 1
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  # forceReplicas=1: single pod, PDB should be 0%
  - it: forceReplicas 1 means minAvailable 0%
    set:
      env: prd
      deployment:
        forceReplicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: forceReplicas 1 with containers list means minAvailable 0%
    set:
      env: prd
      deployment:
        forceReplicas: 1
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  # forceReplicas > 1: multiple pods, PDB should protect
  - it: forceReplicas 2 means minAvailable 50%
    set:
      env: prd
      deployment:
        forceReplicas: 2
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: forceReplicas 2 with containers list means minAvailable 50%
    set:
      env: prd
      deployment:
        forceReplicas: 2
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: forceReplicas 3 means minAvailable 50%
    set:
      env: prd
      deployment:
        forceReplicas: 3
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: forceReplicas 3 with custom deployment.minAvailable
    set:
      env: prd
      deployment:
        forceReplicas: 3
        minAvailable: 33%
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "33%"
  # PDB document always exists (helm can't delete previous config)
  - it: PDB document exists even when forceReplicas is 1
    set:
      env: prd
      deployment:
        forceReplicas: 1
      containers:
        - image: some
    asserts:
      - hasDocuments:
          count: 1
  - it: PDB document exists with custom deployment.minAvailable
    set:
      env: prd
      deployment:
        minAvailable: 4
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.minAvailable
          value: 4
  - it: can override release name
    set:
      env: prd
      releaseName: override
    asserts:
      - equal:
          path: metadata.name
          value: override
  # deployment.minAvailable works across environments
  - it: deployment.minAvailable overrides default in tst
    set:
      env: tst
      deployment:
        maxReplicas: 5
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: deployment.minAvailable custom value in tst
    set:
      env: tst
      deployment:
        maxReplicas: 2
        minAvailable: 27%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "27%"
  - it: default minReplicas 2 means PDB is 50% without explicit config in tst
    set:
      env: tst
      deployment:
        minReplicas: null
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: deployment.minAvailable custom value in dev
    set:
      env: dev
      deployment:
        minReplicas: 2
        minAvailable: 24%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "24%"
  - it: deployment.minAvailable custom value in dev with maxReplicas
    set:
      env: dev
      deployment:
        maxReplicas: 2
        minAvailable: 29%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "29%"
  - it: minReplicas 2 in dev means minAvailable 50%
    set:
      env: dev
      deployment:
        minReplicas: 2
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
