suite: test pdb
values:
  - ./values/common-test-values.yaml
templates:
  - pdb.yaml
tests:
  - it: must have labels
    set:
      env: dev
      labels:
        custom: label
    asserts:
      - isNotEmpty:
          path: metadata.labels
      - equal:
          path: metadata.labels.environment
          value: dev
      - equal:
          path: metadata.labels.custom
          value: label
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: rudder-test
  - it: must have annotations
    set:
      env: prd
    asserts:
      - equal:
          path: metadata.annotations["meta.helm.sh/release-name"]
          value: rudder-test
      - equal:
          path: metadata.annotations["meta.helm.sh/release-namespace"]
          value: NAMESPACE
  - it: must always have unhealthyPodEvictionPolicy AlwaysAllow
    set:
      env: prd
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
  - it: must have unhealthyPodEvictionPolicy even when minAvailable is 0%
    set:
      env: dev
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
  - it: must use default with 2 replicas or more
    set:
      env: prd
      deployment:
        replicas: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: must use default with 2 maxreplicas or more in prod
    set:
      env: prd
      deployment:
        maxReplicas: 3
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: use minAvailable from container if not set on pdb
    set:
      env: prd
      deployment:
        replicas: 2
        minAvailable: 27%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "27%"
  - it: use minAvailable from deployment if not set on pdb or container
    set:
      env: prd
      deployment:
        replicas: 2
        minAvailable: 26%
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "26%"
  - it: check for minAvailable on deployment before container
    set:
      env: prd
      deployment:
        replicas: 2
        minAvailable: 30%
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "30%"
  - it: pdb.minAvailable takes precedence over container.minAvailable
    set:
      env: prd
      pdb:
        minAvailable: 25%
      deployment:
        replicas: 2
      containers:
        - image: app
    asserts:
      - equal:
          path: spec.minAvailable
          value: "25%"
  # replicas=1 with HPA enabled: HPA forces min 2 pods, PDB should protect
  - it: if replicas is 1 in prd, minAvailable must be 0% (single pod)
    set:
      env: prd
      deployment:
        replicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: prd defaults to minAvailable 50% when replicas not set (minReplicas=2)
    set:
      env: prd
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  # replicas=1 without HPA: truly single pod, PDB should be 0%
  - it: if container replicas is 1 in dev without HPA, minAvailable must be 0%
    set:
      env: dev
      deployment:
        replicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: if deployment replicas is 1 in dev without HPA, minAvailable must be 0%
    set:
      env: dev
      deployment:
        replicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  # forceReplicas=1: single pod, PDB should be 0%
  - it: if container forceReplicas is set to 1, minAvailable must be 0%
    set:
      env: prd
      deployment:
        forceReplicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: if deployment forceReplicas is set to 1, minAvailable must be 0%
    set:
      env: prd
      deployment:
        forceReplicas: 1
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  # forceReplicas > 1: multiple pods, PDB should protect
  - it: if container forceReplicas is 2, minAvailable must be 50%
    set:
      env: prd
      deployment:
        forceReplicas: 2
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: if deployment forceReplicas is 2, minAvailable must be 50%
    set:
      env: prd
      deployment:
        forceReplicas: 2
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: if container forceReplicas is 3, minAvailable must be 50%
    set:
      env: prd
      deployment:
        forceReplicas: 3
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: if deployment forceReplicas is 3 with custom minAvailable, must use custom value
    set:
      env: prd
      pdb:
        minAvailable: 33%
      deployment:
        forceReplicas: 3
      containers:
        - image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "33%"
  # PDB document always exists (helm can't delete previous config)
  - it: must have pdb document when forceReplicas is 1 on deployment
    set:
      env: prd
      deployment:
        forceReplicas: 1
      containers:
        - image: some
    asserts:
      - hasDocuments:
          count: 1
  - it: must use pdb when replicas not set
    set:
      env: prd
      deployment:
        minAvailable: 4
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.minAvailable
          value: 4
  - it: can override release name
    set:
      env: prd
      releaseName: override
    asserts:
      - equal:
          path: metadata.name
          value: override
  # test env
  - it: must use default with 2 maxReplicas or more
    set:
      env: tst
      deployment:
        maxReplicas: 5
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: must use default with 2 maxreplicas or more in tst
    set:
      env: tst
      deployment:
        maxReplicas: 3
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
  - it: use minAvailable from container if not set on pdb in tst
    set:
      env: tst
      deployment:
        maxReplicas: 2
        minAvailable: 27%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "27%"
  - it: minAvailable equals zero if no HPA and no replicas set in tst
    set:
      env: tst
      deployment:
        replicas: null
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: minAvailable equals zero if no HPA and no replicas set on deployment in tst
    set:
      env: tst
      deployment:
        replicas: null
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: minAvailable equals zero if no HPA and no replicas set in dev
    set:
      env: dev
      deployment:
        replicas: null
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  - it: minAvailable from container is used when 2 replicas in dev without HPA
    set:
      env: dev
      deployment:
        replicas: 2
        minAvailable: 24%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "24%"
  - it: use minAvailable from container if not set on pdb in dev
    set:
      env: dev
      deployment:
        maxReplicas: 2
        minAvailable: 29%
    asserts:
      - equal:
          path: spec.minAvailable
          value: "29%"
  # replicas=1 with HPA via maxReplicas in non-prd: HPA active, PDB should protect
  - it: if replicas is 1 in dev, minAvailable must be 0% (single pod)
    set:
      env: dev
      deployment:
        replicas: 1
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "0%"
  # replicas > 1 in non-prd
  - it: if replicas is 2 without HPA in dev, minAvailable must be 50%
    set:
      env: dev
      deployment:
        replicas: 2
      container:
        image: some
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
